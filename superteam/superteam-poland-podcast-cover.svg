      <path d="M236 -155 C196 -96 272 -54 226 12 M342 -178 C298 -112 384 -70 328 -8 M440 -145 C402 -92 466 -54 426 6" fill="none" stroke="#f4e7d5" stroke-width="28" stroke-linecap="round" opacity="0.75"/>
