    <text x="1500" y="2520" font-family="Inter, Avenir Next, Montserrat, Arial, sans-serif" font-size="68" font-weight="700" fill="#9fb8d7" letter-spacing="8">FOUNDER TALKS • SOLANA ECOSYSTEM • POLAND</text>
  </g>

  <g opacity="0.78">
