<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000" role="img" aria-labelledby="title desc">
  <title id="title">Two Coffees and a Beer — Superteam Poland podcast cover</title>
  <desc id="desc">Bold square podcast cover with two coffee cups, a beer glass, Solana-inspired gradient accents, waveform ring, and title typography.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="72%">
      <stop offset="0" stop-color="#1c2a4f"/>
      <stop offset="0.42" stop-color="#101728"/>
      <stop offset="1" stop-color="#06070d"/>
    </radialGradient>
    <linearGradient id="solana" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#14f195"/>
      <stop offset="0.48" stop-color="#80ecff"/>
      <stop offset="1" stop-color="#9945ff"/>
    </linearGradient>
    <linearGradient id="beer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe8a1"/>
      <stop offset="0.35" stop-color="#f5ad31"/>
      <stop offset="1" stop-color="#9a4f10"/>
    </linearGradient>
    <linearGradient id="coffee" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0d0a8"/>
      <stop offset="1" stop-color="#7a3e22"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="34" stdDeviation="34" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grain" width="180" height="180" patternUnits="userSpaceOnUse">
      <circle cx="22" cy="37" r="2" fill="#fff" opacity="0.045"/>
      <circle cx="151" cy="89" r="1.5" fill="#fff" opacity="0.035"/>
      <circle cx="80" cy="140" r="1" fill="#14f195" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="3000" height="3000" fill="url(#bgGlow)"/>
  <rect width="3000" height="3000" fill="url(#grain)"/>

  <g opacity="0.85" filter="url(#glow)">
    <circle cx="1500" cy="1470" r="950" fill="none" stroke="url(#solana)" stroke-width="12" stroke-opacity="0.38"/>
    <circle cx="1500" cy="1470" r="790" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.16"/>
    <circle cx="1500" cy="1470" r="1110" fill="none" stroke="#14f195" stroke-width="3" stroke-dasharray="18 34" stroke-opacity="0.22"/>
  </g>

